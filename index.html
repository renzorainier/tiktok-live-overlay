<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Raw TikTok Chat</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: transparent;
            overflow: hidden;
            height: 100vh;
            padding: 16px 14px;
        }

        #chat-container {
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            gap: 8px;
            height: 100%;
            max-width: 440px;
            padding-bottom: 12px;
            /* soft top fade so incoming messages don't hard-cut at the edge */
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 12%, black 100%);
            mask-image: linear-gradient(to bottom, transparent 0%, black 12%, black 100%);
        }

        @keyframes popIn {
            0%   { opacity: 0; transform: translateX(-22px) scale(0.9); }
            50%  { opacity: 1; transform: translateX(3px)  scale(1.02); }
            72%  { transform: translateX(-1px) scale(0.997); }
            100% { opacity: 1; transform: translateX(0) scale(1); }
        }

        @keyframes glowPulse {
            0%   { opacity: 0.9; transform: scale(0.6); }
            60%  { opacity: 0.35; transform: scale(1.6); }
            100% { opacity: 0; transform: scale(2.1); }
        }

        @keyframes shimmer {
            0%   { transform: translateX(-120%) skewX(-15deg); }
            100% { transform: translateX(280%)  skewX(-15deg); }
        }

        @keyframes avatarIn {
            0%   { transform: scale(0.4) rotate(-8deg); opacity: 0; }
            60%  { transform: scale(1.12) rotate(2deg); opacity: 1; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        /* Only ever keep the last N messages in state — older ones are
           dropped outright, not just visually hidden. */
        const MAX_MESSAGES = 10;

        /* TikTok-leaning palette: signature cyan/magenta duo blended with a
           supporting cast so avatars stay legible against any username. */
        const USER_COLORS = [
            '#25F4EE', '#FE2C55', '#FFD166',
            '#7C5CFF', '#4ECDC4', '#FF8A5B',
            '#5CE1E6', '#F368E0', '#8CFF8C',
            '#FFA3E0', '#6C8CFF', '#FFDE59',
        ];

        function getUserColor(username) {
            let hash = 0;
            for (let i = 0; i < username.length; i++) {
                hash = username.charCodeAt(i) + ((hash << 5) - hash);
            }
            return USER_COLORS[Math.abs(hash) % USER_COLORS.length];
        }

        function shortenName(username) {
            if (username.length <= 12) return username;

            const sepMatch = username.match(/^([^_.\-|]+)[_.\-|]/);
            if (sepMatch && sepMatch[1].length >= 3) return sepMatch[1];

            const digitStripped = username.replace(/\d+$/, '');
            if (digitStripped.length >= 3 && digitStripped.length <= 12) return digitStripped;

            const camelWords = username.replace(/([a-z])([A-Z])/g, '$1 $2').split(' ');
            if (camelWords.length >= 2) {
                const short = camelWords[0] + camelWords[1][0].toUpperCase();
                if (short.length <= 12) return short;
            }

            return username.slice(0, 10) + '…';
        }

        function getInitial(username) {
            const match = username.match(/[a-zA-Z0-9]/);
            return match ? match[0].toUpperCase() : '?';
        }

        function hexToRgba(hex, alpha) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r},${g},${b},${alpha})`;
        }

        function shade(hex, percent) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            const clamp = (v) => Math.max(0, Math.min(255, v));
            const nr = clamp(Math.round(r + (percent < 0 ? r : 255 - r) * percent));
            const ng = clamp(Math.round(g + (percent < 0 ? g : 255 - g) * percent));
            const nb = clamp(Math.round(b + (percent < 0 ? b : 255 - b) * percent));
            return `rgb(${nr},${ng},${nb})`;
        }

        const ChatMessage = ({ username, message, id }) => {
            const color = useMemo(() => getUserColor(username), [username]);
            const displayName = useMemo(() => shortenName(username), [username]);
            const initial = useMemo(() => getInitial(username), [username]);
            const darkShade = useMemo(() => shade(color, -0.45), [color]);

            const rowStyle = {
                display: 'flex',
                alignItems: 'center',
                gap: '9px',
                maxWidth: '100%',
                opacity: 0,
                animation: 'popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards',
                transformOrigin: 'left center',
            };

            const avatarWrapStyle = {
                position: 'relative',
                flexShrink: 0,
                width: '26px',
                height: '26px',
            };

            const glowRingStyle = {
                position: 'absolute',
                inset: '-3px',
                borderRadius: '50%',
                background: color,
                filter: 'blur(3px)',
                opacity: 0,
                animation: 'glowPulse 0.9s ease-out 0.05s forwards',
                pointerEvents: 'none',
            };

            const avatarStyle = {
                width: '26px',
                height: '26px',
                borderRadius: '50%',
                display: 'flex',
                alignItems: 'center',
                justifyContent: 'center',
                background: `linear-gradient(145deg, ${color}, ${darkShade})`,
                border: '1.5px solid rgba(255,255,255,0.55)',
                boxShadow: `0 2px 8px rgba(0,0,0,0.5), 0 0 0 1px rgba(0,0,0,0.25)`,
                color: '#0a0a0f',
                fontSize: '12px',
                fontWeight: '900',
                letterSpacing: '-0.2px',
                position: 'relative',
                zIndex: 1,
                transform: 'scale(0.4)',
                animation: 'avatarIn 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) forwards',
                flexShrink: 0,
            };

            const bubbleStyle = {
                display: 'inline-flex',
                alignItems: 'baseline',
                gap: '7px',
                background: 'linear-gradient(180deg, rgba(20,20,28,0.72), rgba(10,10,16,0.72))',
                backdropFilter: 'blur(16px) saturate(140%)',
                WebkitBackdropFilter: 'blur(16px) saturate(140%)',
                border: '1px solid rgba(255,255,255,0.08)',
                borderRadius: '16px',
                borderTopLeftRadius: '5px',
                padding: '7px 14px 7px 12px',
                maxWidth: 'calc(100% - 35px)',
                position: 'relative',
                overflow: 'hidden',
                boxShadow: `
                    0 4px 18px rgba(0,0,0,0.4),
                    0 1px 0 rgba(255,255,255,0.06) inset,
                    0 0 0 1px rgba(0,0,0,0.3),
                    inset 2px 0 0 ${hexToRgba(color, 0.9)}
                `,
            };

            const shimmerStyle = {
                position: 'absolute',
                top: 0,
                left: 0,
                width: '45%',
                height: '100%',
                background: 'linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent)',
                animation: 'shimmer 0.75s ease-out 0.18s forwards',
                pointerEvents: 'none',
            };

            const nameStyle = {
                color: color,
                fontSize: '13px',
                fontWeight: '800',
                letterSpacing: '0.1px',
                whiteSpace: 'nowrap',
                flexShrink: 0,
                textShadow: `0 1px 3px rgba(0,0,0,0.75), 0 0 14px ${hexToRgba(color, 0.35)}`,
            };

            const textStyle = {
                color: 'rgba(255,255,255,0.95)',
                fontSize: '14px',
                fontWeight: '600',
                lineHeight: '1.35',
                wordBreak: 'break-word',
                textShadow: '0 1px 3px rgba(0,0,0,0.6)',
            };

            return (
                <div style={rowStyle}>
                    <div style={avatarWrapStyle}>
                        <div style={glowRingStyle} aria-hidden="true" />
                        <div style={avatarStyle}>{initial}</div>
                    </div>
                    <div style={bubbleStyle}>
                        <div style={shimmerStyle} aria-hidden="true" />
                        <span style={nameStyle}>{displayName}</span>
                        <span style={textStyle}>{message}</span>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [messages, setMessages] = useState([]);
            const endRef = useRef(null);

            useEffect(() => {
                const socket = io();
                socket.on('chat', (data) => {
                    setMessages((prev) => [
                        ...prev.slice(-(MAX_MESSAGES - 1)),
                        { ...data, id: Date.now() + Math.random() },
                    ]);
                });
                return () => socket.disconnect();
            }, []);

            useEffect(() => {
                endRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [messages]);

            return (
                <div id="chat-container">
                    {messages.map((msg) => (
                        <ChatMessage
                            key={msg.id}
                            id={msg.id}
                            username={msg.username}
                            message={msg.message}
                        />
                    ))}
                    <div ref={endRef} />
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
