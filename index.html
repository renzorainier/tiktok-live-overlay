
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Raw TikTok Chat</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=500;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: transparent;
            overflow: hidden;
            height: 100vh;
            padding: 16px 14px;
        }

        #chat-container {
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            gap: 6px;
            height: 100%;
            max-width: 420px;
            padding-bottom: 12px;
        }

        @keyframes popIn {
            0%   { opacity: 0; transform: translateX(-20px) scale(0.92); }
            55%  { opacity: 1; transform: translateX(4px)  scale(1.018); }
            75%  { transform: translateX(-2px) scale(0.998); }
            100% { opacity: 1; transform: translateX(0) scale(1); }
        }

        @keyframes shimmer {
            0%   { transform: translateX(-100%) skewX(-15deg); }
            100% { transform: translateX(250%)  skewX(-15deg); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const USER_COLORS = [
            '#FF6B6B', '#4ECDC4', '#FFE66D',
            '#FF9F43', '#54A0FF', '#00D2D3',
            '#F368E0', '#A8E6CF', '#FD79A8',
            '#6C5CE7', '#FDCB6E', '#55EFC4',
        ];

        function getUserColor(username) {
            let hash = 0;
            for (let i = 0; i < username.length; i++) {
                hash = username.charCodeAt(i) + ((hash << 5) - hash);
            }
            return USER_COLORS[Math.abs(hash) % USER_COLORS.length];
        }

        function shortenName(username) {
            if (username.length <= 12) return username;

            const sepMatch = username.match(/^([^_.\-|]+)[_.\-|]/);
            if (sepMatch && sepMatch[1].length >= 3) return sepMatch[1];

            const digitStripped = username.replace(/\d+$/, '');
            if (digitStripped.length >= 3 && digitStripped.length <= 12) return digitStripped;

            const camelWords = username.replace(/([a-z])([A-Z])/g, '$1 $2').split(' ');
            if (camelWords.length >= 2) {
                const short = camelWords[0] + camelWords[1][0].toUpperCase();
                if (short.length <= 12) return short;
            }

            return username.slice(0, 10) + '…';
        }

        function hexToRgba(hex, alpha) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r},${g},${b},${alpha})`;
        }

        const ChatMessage = ({ username, message, id }) => {
            const color = useMemo(() => getUserColor(username), [username]);
            const displayName = useMemo(() => shortenName(username), [username]);

            const bubbleStyle = {
                display: 'inline-flex',
                alignItems: 'baseline',
                gap: '7px',
                background: 'rgba(8, 8, 18, 0.70)',
                backdropFilter: 'blur(14px)',
                WebkitBackdropFilter: 'blur(14px)',
                border: '1px solid rgba(255,255,255,0.09)',
                borderLeft: `3px solid ${color}`,
                borderRadius: '10px',
                borderTopLeftRadius: '4px',
                borderBottomLeftRadius: '4px',
                padding: '7px 13px 7px 10px',
                maxWidth: 'fit-content',
                position: 'relative',
                overflow: 'hidden',
                boxShadow: `
                    0 4px 20px rgba(0,0,0,0.45),
                    0 1px 0 rgba(255,255,255,0.05) inset,
                    0 0 0 1px rgba(0,0,0,0.3)
                `,
                opacity: 0,
                animation: `popIn 0.48s cubic-bezier(0.34, 1.56, 0.64, 1) forwards`,
                transformOrigin: 'left center',
            };

            const shimmerStyle = {
                position: 'absolute',
                top: 0,
                left: 0,
                width: '40%',
                height: '100%',
                background: 'linear-gradient(90deg, transparent, rgba(255,255,255,0.07), transparent)',
                animation: 'shimmer 0.7s ease-out 0.15s forwards',
                pointerEvents: 'none',
            };

            const dotStyle = {
                width: '5px',
                height: '5px',
                borderRadius: '50%',
                background: color,
                flexShrink: 0,
                alignSelf: 'center',
                boxShadow: `0 0 6px 1px ${hexToRgba(color, 0.55)}`,
                marginBottom: '1px',
            };

            const nameStyle = {
                color: color,
                fontSize: '13px',
                fontWeight: '800',
                letterSpacing: '0.15px',
                whiteSpace: 'nowrap',
                flexShrink: 0,
                textShadow: `0 1px 4px rgba(0,0,0,0.7), 0 0 12px ${hexToRgba(color, 0.3)}`,
            };

            const textStyle = {
                color: 'rgba(255,255,255,0.93)',
                fontSize: '14px',
                fontWeight: '600',
                lineHeight: '1.35',
                wordBreak: 'break-word',
                WebkitTextStroke: '0.3px rgba(0,0,0,0.6)',
                textShadow: '1px 2px 4px rgba(0,0,0,0.55)',
            };

            return (
                <div style={bubbleStyle} key={id}>
                    <div style={shimmerStyle} aria-hidden="true" />
                    <span style={dotStyle} aria-hidden="true" />
                    <span style={nameStyle}>{displayName}</span>
                    <span style={textStyle}>{message}</span>
                </div>
            );
        };

        const App = () => {
            const [messages, setMessages] = useState([]);
            const endRef = useRef(null);

            useEffect(() => {
                const socket = io();
                socket.on('chat', (data) => {
                    setMessages((prev) => [
                        ...prev.slice(-39),
                        { ...data, id: Date.now() + Math.random() },
                    ]);
                });
                return () => socket.disconnect();
            }, []);

            useEffect(() => {
                endRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [messages]);

            return (
                <div id="chat-container">
                    {messages.map((msg) => (
                        <ChatMessage
                            key={msg.id}
                            id={msg.id}
                            username={msg.username}
                            message={msg.message}
                        />
                    ))}
                    <div ref={endRef} />
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
